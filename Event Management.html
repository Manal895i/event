<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Event Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #222;
    }

    header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      padding: 25px 20px;
      text-align: center;
    }

    header h1 {
      margin-bottom: 8px;
      font-size: 32px;
    }

    header p {
      font-size: 15px;
      opacity: 0.95;
    }

    nav {
      background: #1f2937;
      padding: 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #a5b4fc;
    }

    .container {
      width: 92%;
      max-width: 1250px;
      margin: 25px auto;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-bottom: 25px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .card h3 {
      font-size: 16px;
      color: #555;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 28px;
      font-weight: bold;
      color: #4f46e5;
    }

    .section-title {
      margin: 25px 0 15px;
      border-left: 5px solid #4f46e5;
      padding-left: 10px;
      font-size: 24px;
    }

    .form-box,
    .tools-box {
      background: white;
      padding: 22px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      margin-bottom: 25px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 11px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn {
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    .btn-success:hover {
      background: #15803d;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    .form-actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 15px;
    }

    .tools-grid input,
    .tools-grid select {
      padding: 11px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      width: 100%;
    }

    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .event-card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      border-top: 6px solid #4f46e5;
      transition: transform 0.3s;
    }

    .event-card:hover {
      transform: translateY(-4px);
    }

    .event-card h3 {
      margin-bottom: 10px;
      color: #4f46e5;
      font-size: 22px;
    }

    .event-card p {
      margin: 8px 0;
      line-height: 1.5;
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      background: #ede9fe;
      color: #5b21b6;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
    }

    .status.upcoming {
      background: #dcfce7;
      color: #166534;
    }

    .status.past {
      background: #fee2e2;
      color: #991b1b;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .empty-state {
      background: white;
      padding: 30px;
      border-radius: 14px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      color: #666;
    }

    footer {
      margin-top: 35px;
      background: #111827;
      color: white;
      text-align: center;
      padding: 16px;
    }

    @media (max-width: 850px) {
      .tools-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 26px;
      }

      nav a {
        display: inline-block;
        margin: 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Advanced Event Management System</h1>
    <p>Create, manage, filter, and track all your events easily</p>
  </header>

  <nav>
    <a href="#dashboard">Dashboard</a>
    <a href="#addEvent">Add Event</a>
    <a href="#allEvents">All Events</a>
  </nav>

  <div class="container">
    <section id="dashboard">
      <h2 class="section-title">Dashboard</h2>
      <div class="dashboard">
        <div class="card">
          <h3>Total Events</h3>
          <p id="totalEvents">0</p>
        </div>
        <div class="card">
          <h3>Upcoming Events</h3>
          <p id="upcomingEvents">0</p>
        </div>
        <div class="card">
          <h3>Past Events</h3>
          <p id="pastEvents">0</p>
        </div>
        <div class="card">
          <h3>Event Categories</h3>
          <p id="eventCategories">0</p>
        </div>
      </div>
    </section>

    <section id="addEvent">
      <h2 class="section-title">Add / Update Event</h2>
      <div class="form-box">
        <form id="eventForm">
          <div class="form-grid">
            <div class="form-group">
              <label>Event Name</label>
              <input type="text" id="eventName" placeholder="Enter event name" required>
            </div>

            <div class="form-group">
              <label>Organizer</label>
              <input type="text" id="organizer" placeholder="Enter organizer name" required>
            </div>

            <div class="form-group">
              <label>Date</label>
              <input type="date" id="eventDate" required>
            </div>

            <div class="form-group">
              <label>Time</label>
              <input type="time" id="eventTime" required>
            </div>

            <div class="form-group">
              <label>Location</label>
              <input type="text" id="eventLocation" placeholder="Enter location" required>
            </div>

            <div class="form-group">
              <label>Category</label>
              <select id="eventType" required>
                <option value="">Select category</option>
                <option value="Conference">Conference</option>
                <option value="Seminar">Seminar</option>
                <option value="Workshop">Workshop</option>
                <option value="Birthday">Birthday</option>
                <option value="Wedding">Wedding</option>
                <option value="College Event">College Event</option>
                <option value="Festival">Festival</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label>Ticket Price</label>
              <input type="number" id="ticketPrice" placeholder="Enter ticket price" min="0" required>
            </div>

            <div class="form-group">
              <label>Capacity</label>
              <input type="number" id="capacity" placeholder="Enter event capacity" min="1" required>
            </div>

            <div class="form-group full">
              <label>Description</label>
              <textarea id="eventDescription" placeholder="Enter event description"></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">Save Event</button>
            <button type="button" class="btn btn-secondary" id="cancelEditBtn" onclick="resetForm()">Cancel Edit</button>
          </div>
        </form>
      </div>
    </section>

    <section id="allEvents">
      <h2 class="section-title">Manage Events</h2>
      <div class="tools-box">
        <div class="tools-grid">
          <input type="text" id="searchInput" placeholder="Search by event name, organizer or location">
          <select id="filterType">
            <option value="All">All Categories</option>
            <option value="Conference">Conference</option>
            <option value="Seminar">Seminar</option>
            <option value="Workshop">Workshop</option>
            <option value="Birthday">Birthday</option>
            <option value="Wedding">Wedding</option>
            <option value="College Event">College Event</option>
            <option value="Festival">Festival</option>
            <option value="Other">Other</option>
          </select>
          <select id="sortBy">
            <option value="latest">Sort by Latest</option>
            <option value="oldest">Sort by Oldest</option>
            <option value="name">Sort by Name</option>
          </select>
        </div>
      </div>

      <div class="events-grid" id="eventsContainer"></div>
    </section>
  </div>

  <footer>
    <p>&copy; 2026 Advanced Event Management System</p>
  </footer>

  <script>
    const eventForm = document.getElementById("eventForm");
    const eventsContainer = document.getElementById("eventsContainer");
    const searchInput = document.getElementById("searchInput");
    const filterType = document.getElementById("filterType");
    const sortBy = document.getElementById("sortBy");
    const submitBtn = document.getElementById("submitBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    let events = JSON.parse(localStorage.getItem("advancedEvents")) || [];
    let editIndex = -1;

    function saveEvents() {
      localStorage.setItem("advancedEvents", JSON.stringify(events));
    }

    function isUpcoming(date) {
      const today = new Date();
      const eventDate = new Date(date);
      today.setHours(0, 0, 0, 0);
      return eventDate >= today;
    }

    function updateDashboard() {
      const total = events.length;
      const upcoming = events.filter(event => isUpcoming(event.date)).length;
      const past = total - upcoming;
      const categories = new Set(events.map(event => event.type)).size;

      document.getElementById("totalEvents").textContent = total;
      document.getElementById("upcomingEvents").textContent = upcoming;
      document.getElementById("pastEvents").textContent = past;
      document.getElementById("eventCategories").textContent = categories;
    }

    function displayEvents() {
      let filteredEvents = [...events];

      const searchValue = searchInput.value.toLowerCase().trim();
      const selectedType = filterType.value;
      const selectedSort = sortBy.value;

      if (searchValue) {
        filteredEvents = filteredEvents.filter(event =>
          event.name.toLowerCase().includes(searchValue) ||
          event.organizer.toLowerCase().includes(searchValue) ||
          event.location.toLowerCase().includes(searchValue)
        );
      }

      if (selectedType !== "All") {
        filteredEvents = filteredEvents.filter(event => event.type === selectedType);
      }

      if (selectedSort === "latest") {
        filteredEvents.sort((a, b) => new Date(b.date) - new Date(a.date));
      } else if (selectedSort === "oldest") {
        filteredEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
      } else if (selectedSort === "name") {
        filteredEvents.sort((a, b) => a.name.localeCompare(b.name));
      }

      eventsContainer.innerHTML = "";

      if (filteredEvents.length === 0) {
        eventsContainer.innerHTML = `
          <div class="empty-state">
            <h3>No events found</h3>
            <p>Try changing search or filter options.</p>
          </div>
        `;
        return;
      }

      filteredEvents.forEach((event) => {
        const originalIndex = events.findIndex(
          e =>
            e.name === event.name &&
            e.date === event.date &&
            e.time === event.time &&
            e.location === event.location
        );

        const card = document.createElement("div");
        card.className = "event-card";

        card.innerHTML = `
          <span class="badge">${event.type}</span>
          <h3>${event.name}</h3>
          <p><strong>Organizer:</strong> ${event.organizer}</p>
          <p><strong>Date:</strong> ${event.date}</p>
          <p><strong>Time:</strong> ${event.time}</p>
          <p><strong>Location:</strong> ${event.location}</p>
          <p><strong>Ticket Price:</strong> ₹${event.ticketPrice}</p>
          <p><strong>Capacity:</strong> ${event.capacity}</p>
          <p><strong>Description:</strong> ${event.description || "No description available"}</p>
          <span class="status ${isUpcoming(event.date) ? "upcoming" : "past"}">
            ${isUpcoming(event.date) ? "Upcoming" : "Past"}
          </span>
          <div class="card-actions">
            <button class="btn btn-success" onclick="editEvent(${originalIndex})">Edit</button>
            <button class="btn btn-danger" onclick="deleteEvent(${originalIndex})">Delete</button>
          </div>
        `;

        eventsContainer.appendChild(card);
      });
    }

    eventForm.addEventListener("submit", function(e) {
      e.preventDefault();

      const eventData = {
        name: document.getElementById("eventName").value.trim(),
        organizer: document.getElementById("organizer").value.trim(),
        date: document.getElementById("eventDate").value,
        time: document.getElementById("eventTime").value,
        location: document.getElementById("eventLocation").value.trim(),
        type: document.getElementById("eventType").value,
        ticketPrice: document.getElementById("ticketPrice").value,
        capacity: document.getElementById("capacity").value,
        description: document.getElementById("eventDescription").value.trim()
      };

      if (editIndex === -1) {
        events.push(eventData);
      } else {
        events[editIndex] = eventData;
        editIndex = -1;
      }

      saveEvents();
      updateDashboard();
      displayEvents();
      resetForm();
    });

    function editEvent(index) {
      const event = events[index];

      document.getElementById("eventName").value = event.name;
      document.getElementById("organizer").value = event.organizer;
      document.getElementById("eventDate").value = event.date;
      document.getElementById("eventTime").value = event.time;
      document.getElementById("eventLocation").value = event.location;
      document.getElementById("eventType").value = event.type;
      document.getElementById("ticketPrice").value = event.ticketPrice;
      document.getElementById("capacity").value = event.capacity;
      document.getElementById("eventDescription").value = event.description;

      editIndex = index;
      submitBtn.textContent = "Update Event";
      cancelEditBtn.style.display = "inline-block";

      window.scrollTo({
        top: document.getElementById("addEvent").offsetTop - 50,
        behavior: "smooth"
      });
    }

    function deleteEvent(index) {
      if (confirm("Do you want to delete this event?")) {
        events.splice(index, 1);
        saveEvents();
        updateDashboard();
        displayEvents();
        resetForm();
      }
    }

    function resetForm() {
      eventForm.reset();
      editIndex = -1;
      submitBtn.textContent = "Save Event";
      cancelEditBtn.style.display = "none";
    }

    searchInput.addEventListener("input", displayEvents);
    filterType.addEventListener("change", displayEvents);
    sortBy.addEventListener("change", displayEvents);

    cancelEditBtn.style.display = "none";
    updateDashboard();
    displayEvents();
  </script>
</body>
</html>
